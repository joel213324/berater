<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produktberater</title>
  <meta name="description" content="KI-gestützter Produktberater – kostenlos, sofort." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #ff6600;
      --accent-dim: rgba(255,102,0,0.12);
      --green: #22c55e;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      animation: fadeDown 0.4s ease both;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .intro {
      text-align: center;
      padding: 30px 20px 16px;
      animation: fadeUp 0.5s ease both 0.1s;
    }
    .intro h1 { font-size: 1rem; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .intro p { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      padding: 0 8px;
      animation: fadeUp 0.5s ease both 0.2s;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: #bbb;
      font-size: 0.77rem;
      padding: 6px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .chip:hover { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

    .msg-row { display: flex; animation: fadeUp 0.3s ease both; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 10px 15px;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .bot  .bubble { background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; }
    .user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }

    .typing .bubble { padding: 13px 16px; }
    .typing-dots { display: flex; gap: 5px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    .bot-wrap { max-width: 78%; display: flex; flex-direction: column; gap: 8px; }
    .product-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px;
      display: flex;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .product-card:hover { border-color: var(--accent); }
    .product-thumb {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #ff6600, #ff9900);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .product-info strong { display: block; font-size: 0.83rem; font-weight: 500; margin-bottom: 2px; }
    .product-info .price { color: var(--accent); font-weight: 600; font-size: 0.88rem; }
    .product-info .shop { color: var(--muted); font-size: 0.7rem; margin-top: 2px; }

    .input-area {
      padding: 10px 0 18px;
      flex-shrink: 0;
      animation: fadeUp 0.4s ease both 0.3s;
    }
    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(255,102,0,0.5); }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
    }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .send-btn:hover { opacity: 0.85; transform: scale(0.95); }
    .send-btn svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .footer-note { text-align: center; font-size: 0.68rem; color: #444; margin-top: 8px; }
    .footer-note a { color: #444; text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .bubble { max-width: 88%; }
      .bot-wrap { max-width: 88%; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="status">
      <div class="dot"></div>
      <span>Produktberater</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="intro">
      <h1>Wie kann ich dir helfen?</h1>
      <p>Frag mich nach Produkten, Preisen oder Filialen in deiner Nähe.</p>
    </div>
    <div class="chips" id="chips">
      <button class="chip" onclick="sendChip(this)">🔨 Bohrmaschine empfehlen</button>
      <button class="chip" onclick="sendChip(this)">📍 Nächste Filiale finden</button>
      <button class="chip" onclick="sendChip(this)">🌱 Gartentipps für März</button>
      <button class="chip" onclick="sendChip(this)">🪣 Bad renovieren</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Stell deine Frage…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="send()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="footer-note">
      Keine Anmeldung · <a href="#" onclick="return false">Affiliate-Hinweis</a>
    </div>
  </div>

</div>
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');

  // n8n Webhook URL
  const N8N_WEBHOOK_URL = 'https://joel12.app.n8n.cloud/webhook-test/chat';

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function sendChip(btn) {
    hideChips();
    const text = btn.textContent.replace(/^\S+\s/, '');
    addMessage(text, 'user');
    respond(text);
  }

  function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    hideChips();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage(text, 'user');
    respond(text);
  }

  function hideChips() {
    const c = document.getElementById('chips');
    if (c) c.style.display = 'none';
  }

  async function respond(text) {
    showTyping();
    try {
      const res = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      if (!res.ok) throw new Error('Serverfehler');
      const data = await res.json();
      removeTyping();
      if (data.product) {
        addBotResponse(data);
      } else {
        addMessage(data.text || data.response || 'Keine Antwort erhalten.', 'bot');
      }
    } catch (err) {
      removeTyping();
      addMessage('Verbindungsfehler. Bitte versuche es erneut.', 'bot');
      console.error(err);
    }
  }

  function addMessage(text, role) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    row.appendChild(b);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addBotResponse(data) {
    const row  = document.createElement('div');
    row.className = 'msg-row bot';
    const wrap = document.createElement('div');
    wrap.className = 'bot-wrap';
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = data.text;
    wrap.appendChild(b);
    if (data.product) {
      const card = document.createElement('div');
      card.className = 'product-card';
      if (data.product.url) card.onclick = () => window.open(data.product.url, '_blank');
      card.innerHTML = `
        <div class="product-thumb">${data.product.icon || '🛒'}</div>
        <div class="product-info">
          <strong>${data.product.name}</strong>
          <span class="price">${data.product.price}</span>
          <span class="shop">${data.product.shop || 'Jetzt ansehen →'}</span>
        </div>`;
      wrap.appendChild(card);
    }
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot typing';
    row.id = 'typing';
    row.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
</script>
</body>
</html>
